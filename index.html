<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Temperature Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#09090b;color:#e5e5e5;font-family:'IBM Plex Sans',sans-serif;padding:20px 16px;min-height:100vh;}
.mx{max-width:680px;margin:0 auto;}
.mono{font-family:'JetBrains Mono',monospace;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#111113;border-radius:12px;padding:4px;}
.tab-btn{flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;background:transparent;color:#666;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;transition:all 0.2s;}
.tab-btn.active{background:#1f1f23;color:#fff;}
.thermo{border-radius:20px;padding:28px 32px;color:#fff;margin-bottom:16px;transition:all 0.4s;}
.thermo .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;opacity:0.8;margin-bottom:4px;}
.thermo .score-row{display:flex;align-items:baseline;gap:16px;}
.thermo .big{font-size:64px;font-weight:700;line-height:1;}
.thermo .status{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;letter-spacing:2px;}
.bar-track{margin-top:12px;height:8px;background:rgba(0,0,0,0.25);border-radius:4px;position:relative;}
.bar-fill{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,0.7);border-radius:4px;transition:width 0.5s;}
.bar-labels{display:flex;justify-content:space-between;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:10px;opacity:0.6;letter-spacing:1px;}
.verdict{margin-top:14px;font-size:14px;font-weight:500;opacity:0.9;}
.card{background:#111113;border:1px solid #2a2a2f;border-radius:14px;padding:16px 20px;margin-bottom:12px;}
.ind-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #1a1a1f;flex-wrap:wrap;}
.ind-row:last-child{border-bottom:none;}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;width:88px;text-align:center;flex-shrink:0;}
.ind-input{width:66px;background:#1a1a1f;border:1px solid #333;border-radius:6px;color:#e5e5e5;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:4px 6px;text-align:right;}
.btn{background:#1a1a1f;border:1px solid #2a2a2f;border-radius:8px;color:#aaa;cursor:pointer;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.btn:hover{border-color:#444;color:#ccc;}
.btn:disabled{opacity:0.5;cursor:default;}
.sim-box{background:#111113;border:1px solid #2a2a2f;border-radius:14px;padding:16px 20px;margin-top:16px;}
.aftermath-box{background:#0a0a0c;border-radius:10px;padding:14px 16px;margin-top:14px;}
.aftermath-grid{display:flex;gap:12px;margin-bottom:12px;}
.aftermath-cell{flex:1;text-align:center;background:#111113;border-radius:8px;padding:10px 4px;}
.preset-card{background:#111113;border:1px solid #2a2a2f;border-radius:14px;overflow:hidden;margin-bottom:12px;transition:all 0.2s;}
.preset-card.expanded{border-color:#333;}
.preset-header{padding:16px 20px;cursor:pointer;}
.preset-body{padding:0 20px 20px;border-top:1px solid #1a1a1f;}
.preset-bar{margin-top:10px;height:10px;background:#1a1a1f;border-radius:4px;overflow:hidden;}
.preset-bar-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;display:inline-block;margin:2px;}
.snap-tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
.snap-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;}
.action-box{background:#0d1117;border:1px solid #1c2333;border-radius:10px;padding:14px 16px;margin-top:14px;}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #111827;}
.action-item:last-child{border-bottom:none;}
.action-emoji{font-size:16px;flex-shrink:0;margin-top:2px;}
.action-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:#cbd5e1;line-height:1.5;}
.action-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;margin-bottom:8px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.footer{margin-top:28px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#2a2a2f;letter-spacing:1px;}
@media(max-width:500px){.thermo .big{font-size:48px;}.thermo{padding:20px 16px;}.aftermath-grid{flex-direction:column;gap:8px;}}
</style>
</head>
<body>

</div>

// ─── HELPERS ────────────────────────────────────────────────────
function getScore(ind,val){for(const t of ind.thresholds)if(val<=t.max)return t;return ind.thresholds.at(-1);}
function composite(vals){return INDICATORS.reduce((s,ind)=>s+getScore(ind,vals[ind.id]).score,0)/INDICATORS.length;}
function barColor(s){return s<=15?"#2563EB":s<=35?"#38bdf8":s<=65?"#eab308":s<=85?"#f97316":"#dc2626";}
function thermoStyle(s){
  if(s<=15)return{label:"EXTREME FEAR",verdict:"Potential buying opportunity",bg:"linear-gradient(135deg,#1e40af,#2563eb,#3b82f6)",glow:"0 0 60px rgba(37,99,235,0.5)"};
  if(s<=35)return{label:"OVERSOLD",verdict:"Market showing fear — watch for entries",bg:"linear-gradient(135deg,#0284c7,#38bdf8,#67d4fc)",glow:"0 0 40px rgba(56,189,248,0.4)"};
  if(s<=65)return{label:"NEUTRAL",verdict:"Balanced — stay the course",bg:"linear-gradient(135deg,#a16207,#eab308,#fbbf24)",glow:"0 0 40px rgba(234,179,8,0.4)"};
  if(s<=85)return{label:"OVERHEATED",verdict:"Running hot — consider trimming",bg:"linear-gradient(135deg,#c2410c,#f97316,#fb923c)",glow:"0 0 40px rgba(249,115,22,0.4)"};
  return{label:"EXTREME GREED",verdict:"Danger zone — de-risk",bg:"linear-gradient(135deg,#991b1b,#dc2626,#f87171)",glow:"0 0 60px rgba(220,38,38,0.5)"};
}
function similarity(a,b){
  const norm=(ind,val)=>{const sc=ind.thresholds.map(t=>t.score);const mn=Math.min(...sc),mx=Math.max(...sc);return(getScore(ind,val).score-mn)/(mx-mn||1);};
  let dot=0,mA=0,mB=0;
  INDICATORS.forEach(ind=>{const na=norm(ind,a[ind.id]||0),nb=norm(ind,b[ind.id]||0);dot+=na*nb;mA+=na*na;mB+=nb*nb;});
  return mA&&mB?dot/(Math.sqrt(mA)*Math.sqrt(mB)):0;
}
function findSimilar(vals){let best=null,bs=0;PRESETS.forEach(p=>{const s=similarity(vals,p.values);if(s>bs){bs=s;best=p;}});return{preset:best,sim:bs};}
function fmtDate(d){if(!d)return"";return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}
function getPlaybook(score){for(const p of PLAYBOOK)if(score>=p.min&&score<p.max)return p;return PLAYBOOK.at(-1);}
function fmtNum(v,u){return typeof v==="number"?(Number.isInteger(v)?v:v.toFixed(1))+u:"-";}

// ─── FETCHERS ───────────────────────────────────────────────────
async function fetchVIX(){try{const r=await fetch("https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?range=1d&interval=1d");const d=await r.json();return{value:d.chart.result[0].meta.regularMarketPrice,asOf:new Date(d.chart.result[0].meta.regularMarketTime*1000)};}catch{return null;}}
async function fetchFG(){try{const r=await fetch("https://production.dataviz.cnn.io/index/fearandgreed/graphdata");const d=await r.json();return{value:Math.round(d.fear_and_greed.score),asOf:new Date(d.fear_and_greed.timestamp)};}catch{return null;}}
async function fetchRSI(){try{const r=await fetch("https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=1mo&interval=1d");const d=await r.json();const ts=d.chart.result[0].timestamp;const c=d.chart.result[0].indicators.quote[0].close.filter(v=>v!=null);if(c.length<15)return null;let g=0,l=0;for(let i=c.length-14;i<c.length;i++){const df=c[i]-c[i-1];if(df>0)g+=df;else l-=df;}return{value:Math.round(100-100/(1+(g/14)/(l/14||.001))),asOf:new Date(ts.at(-1)*1000)};}catch{return null;}}
async function fetchMA(){try{const r=await fetch("https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=1y&interval=1d");const d=await r.json();const ts=d.chart.result[0].timestamp;const c=d.chart.result[0].indicators.quote[0].close.filter(v=>v!=null);const cur=c.at(-1),sma=c.slice(-200).reduce((a,b)=>a+b,0)/Math.min(c.length,200);return{value:Math.round(((cur-sma)/sma)*1000)/10,asOf:new Date(ts.at(-1)*1000)};}catch{return null;}}
async function fetchYC(){try{const[r10,r2]=await Promise.all([fetch("https://query1.finance.yahoo.com/v8/finance/chart/%5ETNX?range=1d&interval=1d"),fetch("https://query1.finance.yahoo.com/v8/finance/chart/2YY%3DF?range=1d&interval=1d")]);const d10=await r10.json(),d2=await r2.json();return{value:Math.round((d10.chart.result[0].meta.regularMarketPrice-d2.chart.result[0].meta.regularMarketPrice)*100)/100,asOf:new Date(d10.chart.result[0].meta.regularMarketTime*1000)};}catch{return null;}}
const FETCHERS={vix:fetchVIX,fearGreed:fetchFG,rsi:fetchRSI,maDist:fetchMA,yieldCurve:fetchYC};

async function fetchAll(){
  state.loading=true;render();
  const entries=Object.entries(FETCHERS);
  const results=await Promise.allSettled(entries.map(([,fn])=>fn()));
  const fetched=[];
  entries.forEach(([id],i)=>{
    if(results[i].status==="fulfilled"&&results[i].value!=null){
      state.values[id]=results[i].value.value;
      state.timestamps[id]=fmtDate(results[i].value.asOf);
      fetched.push(id);
    }
  });
  MANUAL_IDS.forEach(id=>{if(state.values[id]===50)state.values[id]=MANUAL_DEFAULTS[id];});
  state.autoFetched=fetched;state.loading=false;
  state.lastUpdate=new Date().toLocaleTimeString();
  render();
}

// ─── STORAGE ────────────────────────────────────────────────────
const SK="mkt-temp-snaps";
function loadSnaps(){try{const d=localStorage.getItem(SK);if(d)state.snapshots=JSON.parse(d);}catch{}}
function saveSnaps(){try{localStorage.setItem(SK,JSON.stringify(state.snapshots));}catch{}}
function addSnap(){const s={timestamp:Date.now(),values:{...state.values}};state.snapshots.unshift(s);state.snapshots=state.snapshots.slice(0,50);saveSnaps();render();}
function delSnap(ts){state.snapshots=state.snapshots.filter(s=>s.timestamp!==ts);saveSnaps();render();}

// ─── RENDER ─────────────────────────────────────────────────────
function switchTab(id){
  state.activeTab=id;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",["dashboard","history","snapshots"][i]===id));
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  render();
}

function updateVal(id,v){if(!isNaN(v)){state.values[id]=v;render();}}
function loadPreset(p){state.values={...p.values};state.timestamps={};state.autoFetched=[];switchTab("dashboard");}
function togglePreset(id){state.expandedPreset=state.expandedPreset===id?null:id;render();}

function render(){
  const score=composite(state.values);
  if(state.activeTab==="dashboard")renderDashboard(score);
  if(state.activeTab==="history")renderHistory(score);
  if(state.activeTab==="snapshots")renderSnapshots(score);
}

function renderDashboard(score){
  const t=thermoStyle(score);const s=Math.max(0,Math.min(100,score));
  const sim=findSimilar(state.values);const p=sim.preset;const pct=Math.round(sim.sim*100);
  const pb=getPlaybook(score);
  const a=p?.aftermath;

  let html=`
  <div class="thermo" style="background:${t.bg};box-shadow:${t.glow}">
    <div class="lbl">${state.lastUpdate?`LIVE · ${state.lastUpdate}`:"COMPOSITE MARKET TEMPERATURE"}</div>
    <div class="score-row"><span class="big">${Math.round(s)}</span><span class="status">${t.label}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${s}%"></div></div>
    <div class="bar-labels"><span>🥶 OVERSOLD</span><span>🔥 OVERHEATED</span></div>
    <div class="verdict">→ ${t.verdict}</div>
  </div>`;

  // Action playbook
  html+=`<div class="action-box">
    <div class="action-label" style="color:${pb.color}">${pb.emoji} ${pb.zone} — ACTION PLAYBOOK</div>
    ${pb.actions.map(a=>`<div class="action-item"><span class="action-emoji">→</span><span class="action-text">${a}</span></div>`).join("")}
  </div>`;

  // Similarity
  if(p){
    html+=`<div class="sim-box">
      <div style="display:flex;align-items:center;gap:16px">
        <span style="font-size:28px">${p.emoji}</span>
        <div style="flex:1">
          <div class="mono" style="font-size:11px;color:#888;letter-spacing:1px">MOST SIMILAR TO</div>
          <div style="font-size:16px;font-weight:700">${p.name} <span style="color:#666;font-weight:400">(${p.date})</span></div>
          <div class="mono" style="font-size:12px;color:${pct>85?"#f87171":pct>70?"#fbbf24":"#38bdf8"};font-weight:600">${pct}% similarity</div>
        </div>
      </div>`;
    if(a){
      html+=`<div class="aftermath-box">
        <div class="mono" style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:10px">📉 WHAT HAPPENED NEXT</div>
        <div class="aftermath-grid">
          ${[{l:"3M",v:a.sp_3m},{l:"6M",v:a.sp_6m},{l:"1Y",v:a.sp_1y}].map(({l,v})=>`
            <div class="aftermath-cell">
              <div class="mono" style="font-size:10px;color:#555;margin-bottom:4px">${l}</div>
              <div class="mono" style="font-size:18px;font-weight:700;color:${v==="TBD"?"#555":v.startsWith("+")?"#22c55e":"#ef4444"}">${v}</div>
            </div>`).join("")}
        </div>
        <div class="mono" style="font-size:11px;color:#888;line-height:1.5">${a.narrative}</div>
      </div>`;
    }
    html+=`</div>`;
  }

  // Indicators
  html+=`<div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="mono" style="font-size:11px;color:#444;letter-spacing:3px">INDICATORS</span>
      <button class="btn" onclick="fetchAll()" ${state.loading?"disabled":""}>${state.loading?"⏳ Fetching...":"🔄 Refresh Live Data"}</button>
    </div>`;
  INDICATORS.forEach(ind=>{
    const r=getScore(ind,state.values[ind.id]);const c=COLORS[r.color];const isManual=MANUAL_IDS.includes(ind.id);
    const ts=state.timestamps[ind.id];const live=state.autoFetched.includes(ind.id);
    html+=`<div class="ind-row">
      <span class="mono" style="font-size:12px;color:#666;width:22px">${ind.icon}</span>
      <span style="font-size:14px;font-weight:600;width:95px;flex-shrink:0">${ind.name}</span>
      <span class="badge" style="background:${c.bg};color:${c.text}">${r.label}</span>
      <input class="ind-input" type="number" value="${state.values[ind.id]}" step="any" onchange="updateVal('${ind.id}',parseFloat(this.value))">
      <span class="mono" style="font-size:11px;color:#555;width:14px">${ind.unit}</span>
      <span class="mono" style="font-size:9px;color:${isManual?"#665500":live?"#2a6":"#444"};margin-left:auto">${isManual?"✏️ manual":live?`✓ ${ts||"live"}`:"—"}</span>
    </div>
    <div style="padding:0 0 6px 34px"><span class="mono" style="font-size:9px;color:#444">→ ${r.action}</span></div>`;
  });
  html+=`</div>`;

  document.getElementById("tab-dashboard").innerHTML=html;
}

function renderHistory(){
  let html=`<div class="mono" style="font-size:11px;color:#444;letter-spacing:3px;padding-left:4px;margin-bottom:12px">HISTORICAL SCENARIOS</div>`;
  PRESETS.forEach(p=>{
    const s=Math.round(composite(p.values));const bc=barColor(s);
    const sim=Math.round(similarity(state.values,p.values)*100);
    const exp=state.expandedPreset===p.id;const a=p.aftermath;
    html+=`<div class="preset-card ${exp?"expanded":""}">
      <div class="preset-header" onclick="togglePreset('${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:24px">${p.emoji}</span>
            <div>
              <div style="font-size:15px;font-weight:700">${p.name}</div>
              <div class="mono" style="font-size:11px;color:#666">${p.date} · ${p.desc}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="mono" style="font-size:20px;font-weight:700;color:${bc}">${s}</div>
            <div class="mono" style="font-size:10px;color:${sim>80?"#f87171":sim>60?"#fbbf24":"#555"}">${sim}% match</div>
          </div>
        </div>
        <div class="preset-bar"><div class="preset-bar-fill" style="width:${Math.max(2,s)}%;background:${bc}"></div></div>
      </div>`;
    if(exp){
      html+=`<div class="preset-body">
        <div class="aftermath-box">
          <div class="mono" style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:10px">📉 S&P 500 AFTER THIS POINT</div>
          <div class="aftermath-grid">
            ${[{l:"3 Months",v:a.sp_3m},{l:"6 Months",v:a.sp_6m},{l:"1 Year",v:a.sp_1y}].map(({l,v})=>`
              <div class="aftermath-cell">
                <div class="mono" style="font-size:10px;color:#555;margin-bottom:4px">${l}</div>
                <div class="mono" style="font-size:20px;font-weight:700;color:${v==="TBD"?"#555":v.startsWith("+")?"#22c55e":"#ef4444"}">${v}</div>
              </div>`).join("")}
          </div>
          <div class="mono" style="font-size:11px;color:#888;line-height:1.6">${a.narrative}</div>
        </div>
        <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
          ${INDICATORS.map(ind=>{const r=getScore(ind,p.values[ind.id]);const c=COLORS[r.color];return`<span class="tag" style="background:${c.bg};color:${c.text}">${ind.icon} ${fmtNum(p.values[ind.id],ind.unit)}</span>`;}).join("")}
        </div>
        <button class="btn" onclick="loadPreset(PRESETS.find(x=>x.id==='${p.id}'))" style="margin-top:14px;width:100%;padding:10px;font-weight:600">Load into Dashboard →</button>
      </div>`;
    }
    html+=`</div>`;
  });
  document.getElementById("tab-history").innerHTML=html;
}

function renderSnapshots(){
  const score=composite(state.values);
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span class="mono" style="font-size:11px;color:#444;letter-spacing:3px">SAVED SNAPSHOTS</span>
    <button class="btn" onclick="addSnap()">📸 Save Current (${Math.round(score)})</button>
  </div>`;
  if(!state.snapshots.length){
    html+=`<div class="mono" style="font-size:12px;color:#444;text-align:center;padding:40px">No snapshots yet.</div>`;
  }
  state.snapshots.forEach((snap,i)=>{
    const s=Math.round(composite(snap.values));const bc=barColor(s);
    const sim=Math.round(similarity(state.values,snap.values)*100);
    const similar=findSimilar(snap.values);
    const days=Math.round((Date.now()-snap.timestamp)/(864e5));
    const delta=i<state.snapshots.length-1?Math.round(composite(snap.values)-composite(state.snapshots[i+1].values)):null;
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="mono" style="font-size:22px;font-weight:700;color:${bc}">${s}</span>
            ${delta!==null?`<span class="mono" style="font-size:12px;color:${delta>0?"#f87171":delta<0?"#38bdf8":"#666"}">${delta>0?"+":""}${delta} vs prev</span>`:""}
          </div>
          <div class="mono" style="font-size:11px;color:#666;margin-top:2px">
            ${new Date(snap.timestamp).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})} ${new Date(snap.timestamp).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}
            ${days>0?`<span style="color:#444"> · ${days}d ago</span>`:""}
          </div>
          <div class="mono" style="font-size:11px;color:#555;margin-top:4px">≈ ${similar.preset?.emoji} ${similar.preset?.name} (${Math.round(similar.sim*100)}%)</div>
        </div>
        <button onclick="delSnap(${snap.timestamp})" style="background:none;border:none;color:#444;cursor:pointer;font-family:'JetBrains Mono';font-size:14px">✕</button>
      </div>
      <div class="snap-tags">
        ${INDICATORS.map(ind=>{const r=getScore(ind,snap.values[ind.id]);const c=COLORS[r.color];return`<span class="snap-tag" style="background:${c.bg};color:${c.text}">${ind.icon}${fmtNum(snap.values[ind.id],"")}</span>`;}).join("")}
      </div>
      <div class="mono" style="margin-top:8px;font-size:10px;color:${sim>80?"#f87171":sim>60?"#fbbf24":"#555"}">vs current: ${sim}% similar</div>
    </div>`;
  });
  document.getElementById("tab-snapshots").innerHTML=html;
}

// ─── INIT ───────────────────────────────────────────────────────
loadSnaps();
render();
fetchAll();
</script>
</body>
</html>
