<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Temperature v2</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --bg:#09090b;
      --panel:#111113;
      --panel-2:#0d1117;
      --border:#23232a;
      --muted:#777;
      --text:#e7e7ea;
      --sub:#a1a1aa;
      --blue:#2563eb;
      --sky:#38bdf8;
      --yellow:#eab308;
      --orange:#f97316;
      --red:#dc2626;
      --green:#22c55e;
      --radius:16px;
      --radius-sm:10px;
      --shadow:0 10px 30px rgba(0,0,0,.25);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'IBM Plex Sans',sans-serif;
      padding:16px;
      min-height:100vh;
    }
    .wrap{max-width:820px;margin:0 auto}
    .mono{font-family:'JetBrains Mono',monospace}
    .muted{color:var(--muted)}
    .sub{color:var(--sub)}
    .hidden{display:none!important}

    .tabs{
      display:flex;gap:6px;background:var(--panel);padding:5px;border-radius:14px;
      margin-bottom:16px;border:1px solid var(--border);position:sticky;top:12px;z-index:10;
      backdrop-filter:blur(8px);
    }
    .tab-btn{
      flex:1;border:none;background:transparent;color:#6b7280;border-radius:10px;
      padding:10px 8px;font-size:11px;font-weight:700;cursor:pointer;
      font-family:'JetBrains Mono',monospace;transition:.2s;
    }
    .tab-btn.active{background:#1b1b21;color:#fff}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .grid{
      display:grid;gap:12px;
      grid-template-columns:1fr;
    }
    .two{grid-template-columns:1fr 1fr}
    .three{grid-template-columns:repeat(3,1fr)}

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }
    .hero{
      border-radius:24px;
      padding:22px;
      color:#fff;
      margin-bottom:12px;
      transition:.25s;
    }

    .hero-top{
      display:flex;justify-content:space-between;gap:12px;align-items:flex-start;
    }
    .score-row{
      display:flex;gap:14px;align-items:flex-end;margin-top:8px
    }
    .score{
      font-size:68px;line-height:.9;font-weight:800;letter-spacing:-2px
    }
    .regime{
      font-size:18px;font-weight:700;letter-spacing:1px
    }
    .hero-sub{margin-top:10px;font-size:14px;opacity:.95}
    .bar{
      height:8px;border-radius:999px;background:rgba(0,0,0,.25);overflow:hidden;margin-top:14px
    }
    .bar > div{height:100%;background:rgba(255,255,255,.76);transition:width .35s}

    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .section-title{
      font-size:11px;letter-spacing:2px;color:#6b7280;margin-bottom:10px;
      font-family:'JetBrains Mono',monospace
    }

    .pill{
      display:inline-flex;align-items:center;gap:6px;
      border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;
      font-family:'JetBrains Mono',monospace;border:1px solid transparent;
    }
    .pill.ok{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.18)}
    .pill.warn{background:rgba(249,115,22,.12);color:#fdba74;border-color:rgba(249,115,22,.18)}
    .pill.bad{background:rgba(220,38,38,.12);color:#fca5a5;border-color:rgba(220,38,38,.18)}
    .pill.info{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.18)}

    .btn{
      border:1px solid #31313a;background:#17171c;color:#d4d4d8;border-radius:10px;
      padding:8px 12px;cursor:pointer;font-size:11px;font-weight:700;
      font-family:'JetBrains Mono',monospace
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.ghost{background:transparent;color:#a1a1aa}

    .kpi{
      background:var(--panel-2);
      border:1px solid #1d2431;border-radius:14px;padding:14px
    }
    .kpi .v{font-size:28px;font-weight:800}
    .kpi .l{font-size:11px;color:#7b8190;letter-spacing:2px;font-family:'JetBrains Mono',monospace}
    .kpi .s{font-size:12px;color:#aeb6c3;margin-top:5px}

    .action-list,.driver-list,.note-list{display:grid;gap:8px}
    .action-item,.driver-item,.note-item,.indicator-row,.snap-row,.analog-row{
      background:#0b0b0e;border:1px solid #1a1a20;border-radius:12px;padding:12px
    }

    .indicator-row{
      display:grid;grid-template-columns:24px 100px 1fr auto;gap:10px;align-items:center
    }
    .indicator-name{font-size:14px;font-weight:600}
    .indicator-meta{font-size:10px;color:#64646f;font-family:'JetBrains Mono',monospace}
    .indicator-value{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .indicator-action{margin-top:6px;font-size:11px;color:#9ca3af}
    .indicator-line{height:8px;border-radius:999px;background:#17171c;overflow:hidden}
    .indicator-line > div{height:100%}

    .badge{
      font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
      padding:4px 8px;border-radius:7px;white-space:nowrap
    }

    .disclosure{
      font-size:11px;color:#8b8b94;line-height:1.5
    }

    .analog-head,.snap-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px
    }

    .mini-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px
    }
    .mini{
      text-align:center;background:#111115;border-radius:10px;padding:10px 8px
    }
    .mini .t{font-size:10px;color:#6b7280;font-family:'JetBrains Mono',monospace}
    .mini .v{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:4px}

    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .tag{
      font-size:10px;border-radius:6px;padding:4px 7px;font-family:'JetBrains Mono',monospace
    }

    .chart-card{padding:14px}
    .chart-wrap{height:280px}

    .footer{
      margin:18px 0 6px;text-align:center;font-size:10px;color:#444;font-family:'JetBrains Mono',monospace;letter-spacing:1px
    }

    .empty,.error-box,.loading-box{
      text-align:center;padding:28px 18px;border-radius:14px;background:#0d0d11;border:1px dashed #262631;color:#8f8f99
    }

    .status-banner{
      margin-bottom:12px;padding:10px 12px;border-radius:12px;
      border:1px solid #2a2f3a;background:#0c1017;font-size:12px;color:#aab4c3
    }

    details summary{
      cursor:pointer;list-style:none
    }
    details summary::-webkit-details-marker{display:none}

    @media (max-width:700px){
      .two,.three{grid-template-columns:1fr}
      .indicator-row{grid-template-columns:24px 1fr auto}
      .indicator-row .indicator-bar-wrap{grid-column:2 / 4}
      .score{font-size:54px}
      .hero{padding:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="dash">🌡️ Dashboard</button>
      <button class="tab-btn" data-tab="history">📜 History</button>
      <button class="tab-btn" data-tab="charts">📊 Charts</button>
      <button class="tab-btn" data-tab="snaps">📸 Snapshots</button>
    </div>

    <div id="app-status"></div>

    <section id="tab-dash" class="tab-panel active"></section>
    <section id="tab-history" class="tab-panel"></section>
    <section id="tab-charts" class="tab-panel"></section>
    <section id="tab-snaps" class="tab-panel"></section>

    <div class="footer">NOT FINANCIAL ADVICE · EDUCATIONAL DASHBOARD</div>
  </div>

  <script>
    const INDICATORS = [

      {

      },
      {

          { mx:-0.5, label:"Deep Inversion", score:80, color:"warm", action:"Late-cycle caution; stay selective." },

          { mx:-10, label:"Correction", score:20, color:"cool", action:"Build watchlist; buy in tranches." },
          { mx:5, label:"Flat", score:45, color:"neutral", action:"Wait for clearer trend." },

        ]
      }
    ];

    const PRESETS = [
      {id:"bm87",n:"Black Monday",d:"Oct 1987",e:"⬛",desc:"S&P -20% in one day",c:"#1e40af",af:{m3:"+15%",m6:"+23%",y1:"+21%",n:"Sharp panic followed by strong rebound."},v:{vix:60,fearGreed:3,rsi:15,maDist:-25,yieldCurve:0.8,sp500Change:-20}},
      {id:"dc00",n:"Dot-Com Peak",d:"Mar 2000",e:"🫧",desc:"Tech euphoria peak",c:"#ef4444",af:{m3:"-4%",m6:"-7%",y1:"-12%",n:"High valuation peaks can unwind for longer than expected."},v:{vix:24,fearGreed:85,rsi:72,maDist:15,yieldCurve:-0.2,sp500Change:7}},
      {id:"dc02",n:"Dot-Com Bottom",d:"Oct 2002",e:"💀",desc:"Deep tech bust low",c:"#2563eb",af:{m3:"+8%",m6:"+14%",y1:"+24%",n:"Severe fear eventually turned into a multi-year recovery."},v:{vix:40,fearGreed:10,rsi:22,maDist:-30,yieldCurve:1.8,sp500Change:-23}},
      {id:"gfc07",n:"Pre-GFC Peak",d:"Oct 2007",e:"🏠",desc:"Late-cycle housing peak",c:"#fb923c",af:{m3:"-10%",m6:"-18%",y1:"-40%",n:"A warm-looking tape can still hide major macro risk."},v:{vix:16,fearGreed:75,rsi:68,maDist:10,yieldCurve:-0.1,sp500Change:8}},
      {id:"gfc08",n:"GFC Crash",d:"Nov 2008",e:"📉",desc:"Lehman aftermath",c:"#1e40af",af:{m3:"-25%",m6:"+1%",y1:"+23%",n:"Capitulation can still see more downside before recovery."},v:{vix:80,fearGreed:5,rsi:18,maDist:-38,yieldCurve:1.7,sp500Change:-38}},
      {id:"gfc09",n:"GFC Bottom",d:"Mar 2009",e:"🕳️",desc:"S&P 666 low",c:"#2563eb",af:{m3:"+36%",m6:"+51%",y1:"+68%",n:"One of the strongest long-term entry points in modern history."},v:{vix:50,fearGreed:8,rsi:20,maDist:-35,yieldCurve:2.0,sp500Change:-25}},
      {id:"cv20",n:"COVID Crash",d:"Mar 2020",e:"🦠",desc:"Pandemic liquidation",c:"#1e40af",af:{m3:"+30%",m6:"+46%",y1:"+75%",n:"Fast panic, faster rebound once policy support landed."},v:{vix:82,fearGreed:2,rsi:16,maDist:-30,yieldCurve:0.3,sp500Change:-24}},
      {id:"cv21",n:"Post-COVID Mania",d:"Dec 2021",e:"🚀",desc:"Peak speculative appetite",c:"#ef4444",af:{m3:"-8%",m6:"-20%",y1:"-19%",n:"Late-stage greed often leads to painful resets."},v:{vix:17,fearGreed:82,rsi:70,maDist:12,yieldCurve:0.8,sp500Change:27}},
      {id:"br22",n:"2022 Bear",d:"Oct 2022",e:"🐻",desc:"Rate-shock bear low",c:"#38bdf8",af:{m3:"+8%",m6:"+15%",y1:"+21%",n:"Deep fear became a better medium-term setup."},v:{vix:33,fearGreed:15,rsi:28,maDist:-15,yieldCurve:-0.5,sp500Change:-19}},
      {id:"tf25",n:"Tariff Shock",d:"Apr 2025",e:"💣",desc:"Tariff-driven volatility",c:"#38bdf8",af:{m3:"TBD",m6:"TBD",y1:"TBD",n:"Still unfolding; use cautiously as an analog."},v:{vix:52,fearGreed:4,rsi:30,maDist:-10,yieldCurve:0.4,sp500Change:-10}}
    ];

    const PLAYBOOK = [
      {min:0,max:15,label:"EXTREME FEAR",emoji:"💎",color:"#2563eb",actions:["Shift toward offense in tranches.","Buy quality first, beta second.","Ignore panic headlines; focus on sizing."]},
      {min:15,max:35,label:"OVERSOLD",emoji:"🔍",color:"#38bdf8",actions:["Add selectively on weakness.","Favor leaders and resilient balance sheets.","Rebalance toward target risk."]},
      {min:35,max:65,label:"NEUTRAL",emoji:"⚖️",color:"#eab308",actions:["Keep DCA or base plan running.","Avoid overreacting to noise.","Wait for better asymmetry."]},
      {min:65,max:85,label:"OVERHEATED",emoji:"🔥",color:"#f97316",actions:["Trim winners gradually.","Raise some dry powder.","Tighten stops and avoid chase entries."]},
      {min:85,max:101,label:"EXTREME GREED",emoji:"🚨",color:"#dc2626",actions:["De-risk aggressively.","Reduce speculative exposure.","Treat FOMO as a warning sign."]}
    ];

    const VIX_HIST = [
      {d:"1987-10",v:60,l:"Black Monday"},{d:"1998-10",v:45,l:"LTCM"},{d:"2001-09",v:43,l:"9/11"},
      {d:"2002-07",v:45,l:"Dot-Com"},{d:"2008-11",v:80,l:"GFC"},{d:"2009-03",v:50,l:"GFC Bottom"},
      {d:"2010-05",v:45,l:"Flash Crash"},{d:"2011-08",v:48,l:"EU Crisis"},{d:"2015-08",v:40,l:"China Deval"},
      {d:"2018-02",v:37,l:"Volmageddon"},{d:"2020-03",v:82,l:"COVID"},{d:"2022-01",v:31,l:"Rate Hikes"},
      {d:"2024-08",v:38,l:"Carry Unwind"},{d:"2025-04",v:52,l:"Tariffs"}
    ];

    const FG_HIST = [
      {d:"2020-03",v:2,l:"COVID"},{d:"2020-11",v:88,l:"Vaccine"},{d:"2021-02",v:78,l:"Meme Mania"},
      {d:"2021-12",v:82,l:"Peak Euphoria"},{d:"2022-06",v:13,l:"Rate Shock"},{d:"2022-10",v:15,l:"Bear Bottom"},
      {d:"2023-07",v:82,l:"AI Rally"},{d:"2024-03",v:76,l:"ATH"},{d:"2024-08",v:17,l:"Carry Crash"},
      {d:"2025-02",v:72,l:"Pre-Tariff"},{d:"2025-04",v:4,l:"Liberation Day"}
    ];

    const COLORS = {
      hot:{bg:"#dc2626",tx:"#fff"},
      warm:{bg:"#f97316",tx:"#fff"},
      neutral:{bg:"#eab308",tx:"#1a1a1a"},
      cool:{bg:"#38bdf8",tx:"#fff"},
      cold:{bg:"#2563eb",tx:"#fff"}
    };

    const STORAGE_KEY = "market-temp-v2-snaps";

    const state = {
      tab:"dash",
      values:Object.fromEntries(INDICATORS.map(i => [i.id, null])),
      timestamps:{},
      status:Object.fromEntries(INDICATORS.map(i => [i.id, "idle"])),
      errors:{},
      lastUpdated:null,
      loading:false,
      snapshots:[],
      expandedPreset:null,
      charts:{},
      prevComposite:null
    };

    function init(){
      bindTabs();
      loadSnapshots();
      renderAll();
      fetchAll();
      setInterval(fetchAll, 300000);
    }

    function bindTabs(){
      document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const tab = btn.dataset.tab;
          state.tab = tab;
          document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b===btn));
          document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
          document.getElementById("tab-"+tab).classList.add("active");
          renderAll();
          if(tab==="charts") setTimeout(renderCharts, 30);
        });
      });
    }

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
    function fmtNum(v, unit=""){
      if(v === null || v === undefined || Number.isNaN(v)) return "—";
      const out = Number.isInteger(v) ? v : v.toFixed(1);
      return `${out}${unit}`;
    }
    function fmtDate(d){
      if(!d) return "—";
      return new Date(d).toLocaleString("en-US", {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
    }
    function timeAgo(d){
      if(!d) return "—";
      const mins = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
      if(mins < 1) return "just now";
      if(mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins/60);
      if(hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs/24);
      return `${days}d ago`;
    }

    function getThreshold(ind, val){
      if(val === null || val === undefined || Number.isNaN(val)) return null;
      for(const t of ind.thresholds) if(val <= t.mx) return t;
      return ind.thresholds[ind.thresholds.length - 1];
    }

    function normalizedRaw(ind, val){
      if(val === null || val === undefined || Number.isNaN(val)) return null;
      const scaled = ((val - ind.min) / (ind.max - ind.min)) * 100;
      const clamped = clamp(scaled, 0, 100);
      return ind.inverse ? 100 - clamped : clamped;
    }

    function normalizedBucket(ind, val){
      const th = getThreshold(ind, val);
      return th ? th.score : null;
    }

    function composite(values){
      const arr = INDICATORS
        .map(ind => normalizedBucket(ind, values[ind.id]))
        .filter(v => v !== null);
      if(!arr.length) return null;
      return arr.reduce((a,b)=>a+b,0)/arr.length;
    }

    function regime(score){
      if(score === null) return {
        label:"NO DATA", view:"Waiting for live inputs", grad:"linear-gradient(135deg,#27272a,#3f3f46)", glow:"0 0 0 rgba(0,0,0,0)"
      };
      if(score<=15) return {label:"EXTREME FEAR", view:"Potential buying opportunity", grad:"linear-gradient(135deg,#1e40af,#2563eb,#3b82f6)", glow:"0 0 60px rgba(37,99,235,.40)"};
      if(score<=35) return {label:"OVERSOLD", view:"Fear is elevated; watch entries", grad:"linear-gradient(135deg,#0369a1,#38bdf8,#67e8f9)", glow:"0 0 40px rgba(56,189,248,.35)"};
      if(score<=65) return {label:"NEUTRAL", view:"Balanced backdrop; follow process", grad:"linear-gradient(135deg,#a16207,#eab308,#fcd34d)", glow:"0 0 40px rgba(234,179,8,.35)"};
      if(score<=85) return {label:"OVERHEATED", view:"Running hot; trim into strength", grad:"linear-gradient(135deg,#c2410c,#f97316,#fdba74)", glow:"0 0 40px rgba(249,115,22,.35)"};
      return {label:"EXTREME GREED", view:"Danger zone; de-risk", grad:"linear-gradient(135deg,#991b1b,#dc2626,#f87171)", glow:"0 0 60px rgba(220,38,38,.45)"};
    }

    function scoreColor(score){
      if(score === null) return "#71717a";
      if(score<=15) return "#2563eb";
      if(score<=35) return "#38bdf8";
      if(score<=65) return "#eab308";
      if(score<=85) return "#f97316";
      return "#dc2626";
    }

    function getPlaybook(score){
      if(score === null) return null;
      return PLAYBOOK.find(p => score >= p.min && score < p.max) || PLAYBOOK[PLAYBOOK.length - 1];
    }

    function cosineSimilarity(a, b){
      let dot=0, ma=0, mb=0;
      for(const ind of INDICATORS){
        const va = normalizedRaw(ind, a[ind.id]);
        const vb = normalizedRaw(ind, b[ind.id]);
        if(va === null || vb === null) continue;
        dot += va * vb;
        ma += va * va;
        mb += vb * vb;
      }
      return ma && mb ? dot / (Math.sqrt(ma) * Math.sqrt(mb)) : 0;
    }

    function topAnalogs(values, limit=3){
      return PRESETS
        .map(p => ({...p, sim: cosineSimilarity(values, p.v)}))
        .sort((a,b)=>b.sim-a.sim)
        .slice(0, limit);
    }

    function deltaText(cur, prev){
      if(cur === null || prev === null || prev === undefined) return "—";
      const d = cur - prev;
      const sign = d > 0 ? "+" : "";
      return `${sign}${d.toFixed(1)}`;
    }

    function contributionBreakdown(values){
      return INDICATORS.map(ind=>{
        const bucket = normalizedBucket(ind, values[ind.id]);
        return { ind, score: bucket };
      }).filter(x=>x.score !== null)
        .sort((a,b)=>Math.abs(b.score - 50) - Math.abs(a.score - 50));
    }

    function staleLevel(){
      if(!state.lastUpdated) return "bad";
      const mins = Math.floor((Date.now() - new Date(state.lastUpdated).getTime()) / 60000);
      if(mins <= 10) return "ok";
      if(mins <= 30) return "warn";
      return "bad";
    }

    async function fetchJson(url, timeout=8000){
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try{
        const res = await fetch(url, {signal: controller.signal});
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchVIX(){
      const d = await fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?range=1d&interval=1d");
      return {
        value: d.chart.result[0].meta.regularMarketPrice,
        time: new Date(d.chart.result[0].meta.regularMarketTime * 1000).toISOString()
      };
    }

    async function fetchFearGreed(){
      const d = await fetchJson("https://production.dataviz.cnn.io/index/fearandgreed/graphdata");
      return {
        value: Math.round(d.fear_and_greed.score),
        time: new Date(d.fear_and_greed.timestamp).toISOString()
      };
    }

    async function fetchRSI(){
      const d = await fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=2mo&interval=1d");
      const closes = d.chart.result[0].indicators.quote[0].close.filter(v => v != null);
      const ts = d.chart.result[0].timestamp;
      if(closes.length < 15) throw new Error("Not enough closes");
      let gains = 0, losses = 0;
      for(let i = closes.length - 14; i < closes.length; i++){
        const diff = closes[i] - closes[i - 1];
        if(diff > 0) gains += diff;
        else losses -= diff;
      }
      const avgGain = gains / 14;
      const avgLoss = losses / 14 || 0.001;
      const rsi = 100 - (100 / (1 + (avgGain / avgLoss)));
      return {
        value: Math.round(rsi),
        time: new Date(ts.at(-1) * 1000).toISOString()
      };
    }

    async function fetchMADist(){
      const d = await fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=1y&interval=1d");
      const closes = d.chart.result[0].indicators.quote[0].close.filter(v => v != null);
      const ts = d.chart.result[0].timestamp;
      if(!closes.length) throw new Error("No close data");
      const cur = closes.at(-1);
      const sma = closes.slice(-200).reduce((a,b)=>a+b,0) / Math.min(closes.length, 200);
      const dist = ((cur - sma) / sma) * 100;
      return {
        value: Math.round(dist * 10) / 10,
        time: new Date(ts.at(-1) * 1000).toISOString()
      };
    }

    async function fetchYieldCurve(){
      const [d10, d2] = await Promise.all([
        fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/%5ETNX?range=1d&interval=1d"),
        fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/2YY%3DF?range=1d&interval=1d")
      ]);
      const v10 = d10.chart.result[0].meta.regularMarketPrice;
      const v2 = d2.chart.result[0].meta.regularMarketPrice;
      return {
        value: Math.round((v10 - v2) * 100) / 100,
        time: new Date(d10.chart.result[0].meta.regularMarketTime * 1000).toISOString()
      };
    }

    async function fetchSPYTD(){
      const d = await fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=ytd&interval=1d");
      const closes = d.chart.result[0].indicators.quote[0].close.filter(v => v != null);
      const ts = d.chart.result[0].timestamp;
      if(closes.length < 2) throw new Error("Not enough closes");
      const first = closes[0];
      const last = closes.at(-1);
      const pct = ((last - first) / first) * 100;
      return {
        value: Math.round(pct * 10) / 10,
        time: new Date(ts.at(-1) * 1000).toISOString()
      };
    }

    const FETCHERS = {
      vix: fetchVIX,
      fearGreed: fetchFearGreed,
      rsi: fetchRSI,
      maDist: fetchMADist,

      sp500Change: fetchSPYTD
    };

      state.loading = true;
      renderStatus();
      const prevComposite = composite(state.values);
      const jobs = Object.entries(FETCHERS).map(async ([id, fn]) => {
        state.status[id] = "loading";
        state.errors[id] = null;
        try{
          const res = await fn();
          state.values[id] = res.value;
          state.timestamps[id] = res.time;
          state.status[id] = "ok";
        }catch(err){
          state.status[id] = "error";
          state.errors[id] = err.message || "Fetch failed";
        }
      });

      await Promise.allSettled(jobs);
      state.loading = false;
      state.prevComposite = prevComposite;
      state.lastUpdated = new Date().toISOString();
      renderAll();
      if(state.tab === "charts") renderCharts();

      const currentScore = composite(state.values);

      el.innerHTML = `
        <div class="card">
          <div class="row" style="margin-bottom:12px">
            <div class="section-title" style="margin-bottom:0">SNAPSHOTS</div>
            <div style="display:flex;gap:8px">
              <button class="btn" id="snapNowBtn">📸 Save current</button>
              <button class="btn ghost" id="clearSnapsBtn">Clear</button>
            </div>
          </div>

          ${
            state.snapshots.length ? `
              <div style="display:grid;gap:10px">
                ${state.snapshots.map((snap, idx) => {
                  const analog = topAnalogs(snap.values, 1)[0];
                  const prev = state.snapshots[idx + 1];
                  const d = prev ? snap.score - prev.score : null;
                  return `
                    <div class="snap-row">
                      <div class="snap-head">
                        <div>
                          <div style="display:flex;gap:8px;align-items:center">
                            <div class="mono" style="font-size:22px;font-weight:800;color:${scoreColor(snap.score)}">${snap.score === null ? "—" : Math.round(snap.score)}</div>
                            ${d === null ? "" : `<div class="mono" style="font-size:12px;color:${d>0 ? "#fca5a5" : d<0 ? "#93c5fd" : "#71717a"}">${d>0?"+":""}${d.toFixed(1)}</div>`}
                          </div>
                          <div class="mono" style="font-size:11px;color:#6b7280;margin-top:4px">${fmtDate(snap.t)} · ${timeAgo(snap.t)}</div>
                          <div class="mono" style="font-size:11px;color:#9ca3af;margin-top:6px">
                            Closest analog: ${analog ? `${analog.e} ${analog.n} (${Math.round(analog.sim*100)}%)` : "—"}
                          </div>
                        </div>
                        <button class="btn ghost snap-del" data-ts="${snap.t}">Delete</button>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            ` : `<div class="empty">No snapshots yet.</div>`
          }
        </div>
      `;

      const snapBtn = document.getElementById("snapNowBtn");
      const clearBtn = document.getElementById("clearSnapsBtn");
      if(snapBtn) snapBtn.addEventListener("click", snapshotNow);
      if(clearBtn) clearBtn.addEventListener("click", ()=>{
        state.snapshots = [];
        saveSnapshots();
        renderSnapshots();
      });
      el.querySelectorAll(".snap-del").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const ts = Number(btn.dataset.ts);
          state.snapshots = state.snapshots.filter(x => x.t !== ts);
          saveSnapshots();
          renderSnapshots();
        });
      });
    }

    init();
  </script>
</body>
</html>
